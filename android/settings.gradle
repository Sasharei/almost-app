pluginManagement {
  includeBuild("../node_modules/@react-native/gradle-plugin")
  includeBuild("../node_modules/expo-modules-autolinking/android/expo-gradle-plugin")
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

def rnLockFiles =
    settings.layout.rootDirectory
        .dir("../")
        .files("yarn.lock", "package-lock.json", "package.json", "react-native.config.js")
def appConfigLockFiles =
    settings.layout.rootDirectory.files(
        "app/build.gradle",
        "app/build.gradle.kts",
        "app/src/main/AndroidManifest.xml"
    )
def autolinkingLockFiles = rnLockFiles + appConfigLockFiles

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(
      expoAutolinking.rnConfigCommand,
      settings.layout.rootDirectory.dir("../").asFile,
      autolinkingLockFiles
    )
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'Almost'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
